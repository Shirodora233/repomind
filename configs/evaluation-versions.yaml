version: evaluation-versions-v0

prompt_versions:
  oracle-context-v0:
    file: prompts/oracle-context-v0.md
    purpose: Oracle Context call-chain reasoning prompt.
  e2e-task-v0:
    file: prompts/e2e-agent-v0.md
    purpose: E2E task prompt with case metadata, tool budget, tool specs, and output schema.
  e2e-agent-system-v0:
    file: prompts/e2e-agent-system-v0.md
    purpose: E2E JSON action loop system prompt.

tool_versions:
  e2e-tools-v0:
    interface: configs/e2e-tools-v0.yaml
    implementation:
      - scripts/e2e_tools.py
    tools:
      - list_files
      - search_text
      - read_file

agent_strategy_versions:
  e2e-agent-strategy-v0:
    runner: scripts/run_e2e_agent.py
    task_prompt: e2e-task-v0
    system_prompt: e2e-agent-system-v0
    tools: e2e-tools-v0
    protocol: json_action_text_loop

runner_versions:
  oracle-context-runner-v0:
    runner: scripts/run_oracle_context.py
    prompt: oracle-context-v0
  oracle-context-runner-v1:
    runner: scripts/run_oracle_context.py
    prompt: oracle-context-v0
    changes: records structured run-level and case-level wall-clock timing
  e2e-agent-runner-v0:
    runner: scripts/run_e2e_agent.py
    strategy: e2e-agent-strategy-v0
  e2e-agent-runner-v1:
    runner: scripts/run_e2e_agent.py
    strategy: e2e-agent-strategy-v0
    changes: records structured run-level, case-level, model-step, and tool-step wall-clock timing

scorer_versions:
  call-chain-scorer-v0:
    script: scripts/score_predictions.py
    scoring_unit: symbol-level call edge
    metrics: strict symbol-level matching
  call-chain-scorer-v1:
    script: scripts/score_predictions.py
    scoring_unit: symbol-level call edge
    metrics: strict symbol-level matching plus constructor-normalized auxiliary metrics
