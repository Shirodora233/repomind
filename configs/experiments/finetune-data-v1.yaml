version: finetune-data-v1
stage: fine_tune_data_and_training
status: smoke_plus_ready_full_synthetic_frozen_and_training_config_ready

dataset:
  root: datasets/finetune-v1
  schema: datasets/finetune-v1/schemas/finetune-sample.schema.json
  smoke_jsonl: datasets/finetune-v1/smoke/synthetic-micro-smoke.jsonl
  frozen_full_synthetic_jsonl: datasets/finetune-v1/frozen/full-synthetic-readiness-20260621/full-synthetic-readiness.jsonl
  frozen_full_synthetic_manifest: datasets/finetune-v1/frozen/full-synthetic-readiness-20260621/freeze-manifest.json
  frozen_full_synthetic_validation_summary: datasets/finetune-v1/frozen/full-synthetic-readiness-20260621/validation-summary.json
  source_plan: datasets/finetune-v1/source-plan.md
  full_synthetic_manifest_default: runs/finetune/full-synthetic-dry-manifest.json
  current_smoke_source_type: synthetic_micro
  jsonl_required_fields:
    - instruction
    - input
    - output
    - messages
    - repo
    - split
    - task_type
    - target
    - edges
    - evidence
    - negative
    - dynamic_boundary

target_model:
  local_baseline_alias: gemma4-e2b
  training_method: QLoRA
  training_source: Hugging Face format weights
  deployment_reference: Ollama gemma4:e2b remains local inference baseline only

data_requirements:
  minimum_examples: 500
  smoke_examples_target: 58
  smoke_examples_allowed_range: [10, 58]
  format: jsonl
  required_sample_types:
    - positive_call_edges
    - negative_non_call_cases
    - same_name_distractors
    - import_or_string_not_call
    - callback_registration_boundary
    - runtime_only_boundary
    - constructor_symbol_cases
    - explicit_init_calls
    - caller_direction_cases
    - callee_direction_cases
    - evidence_output_cases
    - multi_edge_outputs
    - depth_2_call_chains
    - line_numbered_evidence_cases
    - object_method_calls
    - async_call_edges
    - large_fan_in_cases
    - tests_excluded
    - external_boundary
    - decorator_registration
    - factory_return_cases
    - polymorphism_cases
    - no_callers
    - no_callees
  full_dataset_expansion_rules:
    min_train_repos: 3
    min_dev_repos: 1
    train_dev_repos_must_exclude_current_test_repos: true
    planned_train_dev_examples_before_training: 500
    planned_holdout_or_test_examples: 40
    negative_case_target_ratio: "20%-30%"
    dynamic_boundary_examples_required: true
    output_edges_must_include:
      - caller
      - callee
      - file
      - line
      - evidence
      - confidence_type

leakage_rules:
  split_by_repo: true
  excluded_test_repos:
    - AstrBotDevs/AstrBot
    - scrapy/scrapy
  train_repos_must_not_overlap_dev_or_test: true
  dev_repos_must_not_overlap_test: true
  current_call_chain_v1_test_cases_must_not_enter_training: true
  test_repos_are_evaluation_only:
    - AstrBotDevs/AstrBot
    - scrapy/scrapy

source_plan:
  status: full_synthetic_readiness_frozen_mixed_source_not_frozen
  path: datasets/finetune-v1/source-plan.md
  formal_training_started: false
  full_synthetic_readiness_frozen: true
  mixed_source_formal_dataset_frozen: false
  full_dataset_frozen: false
  freeze_gate_train_dev_examples: 500
  planned_split_counts:
    train: 400
    dev: 100
    test_holdout_or_external_eval: 40
  planned_source_mix:
    real_project: 260
    synthetic_micro_or_full_synthetic: 160
    human_authored: 80
  split_policy:
    train:
      min_repo_groups: 3
      blocked_repos:
        - AstrBotDevs/AstrBot
        - scrapy/scrapy
    dev:
      min_repo_groups: 1
      must_not_overlap_train: true
      blocked_repos:
        - AstrBotDevs/AstrBot
        - scrapy/scrapy
    test:
      current_eval_repos:
        - AstrBotDevs/AstrBot
        - scrapy/scrapy
      must_not_enter_training_export: true
  builder_targets:
    smoke:
      default_count: 58
      writes_checked_in_jsonl: true
    full_synthetic:
      default_count: 500
      default_mode: dry_run_manifest_only
      commit_large_jsonl: false

gates:
  smoke_dataset_examples: 58
  full_dataset_examples: 500
  validate_before_training: true
  smoke_train_before_formal_train: true

resource_constraints:
  formal_training_must_not_overlap_local_ollama_inference: true
  formal_training_must_not_overlap_local_gpu_embedding_indexing: true
  online_api_runs_may_overlap_with_dataset_construction: true
  record_environment_snapshot_before_training: true

reporting:
  batch_dir: reports/finetune/batches
  summary_dir: reports/finetune/summary
  record_file: records/11-finetune-data-and-training.md
