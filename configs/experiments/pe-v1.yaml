version: pe-v1
stage: prompt_engineering
status: scaffolded_prompt_assembly_ready_not_run

baseline_reference:
  dataset: call-chain-v1
  test_set_status: frozen
  baseline_report: reports/baseline/summary/baseline-summary-v0-20260620.md
  scorer: call-chain-scorer-v1
  oracle_runner: oracle-context-runner-v1
  e2e_runner: e2e-agent-runner-v1

optimization_dimensions:
  system_prompt:
    id: S
    goal: clarify role, symbol-level edge definition, direction, output schema, and exclusion rules
    template: prompts/pe/system-v1.md
  few_shot:
    id: F
    minimum_examples: 20
    goal: cover caller/callee, negative, callback, constructor, object-method, large fan-in, and framework cases
    example_library: prompts/pe/few-shot-examples-v1.yaml
  reasoning_checklist:
    id: C
    goal: use an evidence-first verification checklist without requiring verbose chain-of-thought output
    template: prompts/pe/reasoning-checklist-v1.md
  postprocess:
    id: P
    goal: deterministic filtering, sorting, de-duplication, depth checks, and canonical symbol cleanup without golden leakage
    script: scripts/pe_postprocess.py

prompt_assets:
  system: prompts/pe/system-v1.md
  few_shot_examples: prompts/pe/few-shot-examples-v1.yaml
  reasoning_checklist: prompts/pe/reasoning-checklist-v1.md
  final_task_format: prompts/pe/final-task-format-v1.md
  oracle_runnable_template: prompts/pe/oracle-context-pe-v1.md
  e2e_runnable_template: prompts/pe/e2e-task-pe-v1.md
  e2e_system_prompt: prompts/pe/e2e-agent-system-pe-v1.md
  generated_dir: prompts/pe/generated

prompt_assembly:
  script: scripts/assemble_pe_prompts.py
  output_dir: prompts/pe/generated
  assembler_version: pe-prompt-assembler-v1
  base_policy: base and postprocess-only combinations do not generate PE prompt templates
  few_shot_selection_policy: all_20_synthetic_representative_examples
  placeholder_policy:
    oracle:
      - "{{CASE_METADATA}}"
      - "{{ORACLE_CONTEXT}}"
      - "{{OUTPUT_SCHEMA}}"
    e2e_task:
      - "{{CASE_METADATA}}"
      - "{{TOOL_BUDGET}}"
      - "{{TOOL_SPECS}}"
      - "{{OUTPUT_SCHEMA}}"
    e2e_system: []
  cli_examples:
    assemble_single_both: python scripts/assemble_pe_prompts.py --combination S+F+C+P --track both
    assemble_all_both: python scripts/assemble_pe_prompts.py --all --track both

postprocess:
  script: scripts/pe_postprocess.py
  golden_answer_access: forbidden
  default_policy:
    scope: repo_only
    include_tests: false
    external_deps: exclude
  operations:
    - strip_empty_fields
    - normalize_symbol_call_suffixes
    - constructor_expression_cleanup
    - filter_tests_when_excluded
    - filter_external_paths_when_excluded
    - filter_non_repo_paths_for_repo_only_scope
    - remove_exact_duplicates
    - collapse_symbol_duplicates
    - sort_by_caller_callee_file_line
  cli_examples:
    dry_run_single_file: python scripts/pe_postprocess.py --input runs/example/case/prediction.yaml --dry-run
    write_single_file: python scripts/pe_postprocess.py --input runs/example/case/prediction.yaml --output runs/example/case/prediction.pe.yaml

runner_usage:
  oracle_prompt_arg: --prompt prompts/pe/oracle-context-pe-v1.md --prompt-version oracle-context-pe-v1
  e2e_prompt_args: --prompt prompts/pe/e2e-task-pe-v1.md --system-prompt prompts/pe/e2e-agent-system-pe-v1.md --task-prompt-version e2e-task-pe-v1 --system-prompt-version e2e-agent-system-pe-v1
  note: PE v1 scaffold is runnable, but no large-scale real-model PE pilot has been run yet.

matrix_runner:
  script: scripts/run_pe_matrix.py
  default_mode: dry_run_plan_only
  plan_dir: runs/pe/plans
  prompt_assembly_status: implemented_via_generated_templates
  generated_prompt_status_policy:
    missing_generated_prompt: requires_prompt_assembly
    generated_prompt_exists_without_postprocess: ready
    generated_prompt_exists_with_postprocess: ready_with_postprocess_plan
  exact_combination_policy:
    base: use baseline Oracle/E2E prompts and no PE postprocess
    S_F_C: combinations containing S, F, or C use prompts assembled under prompts/pe/generated before real model runs
    P: combinations containing P need deterministic postprocess plus re-score orchestration after runner prediction output
  note: Command plans must mark prompt/postprocess gaps explicitly and must not be reported as completed PE experiments.

pilot:
  matrix: full_factorial_2x2x2x2
  combinations:
    - base
    - S
    - F
    - C
    - P
    - S+F
    - S+C
    - S+P
    - F+C
    - F+P
    - C+P
    - S+F+C
    - S+F+P
    - S+C+P
    - F+C+P
    - S+F+C+P
  case_ids:
    - astrbot-conversation-001
    - astrbot-platform-001
    - scrapy-crawler-001
    - scrapy-engine-005
    - astrbot-agent-002
    - astrbot-chat-002
    - astrbot-conversation-003
    - astrbot-eventbus-001
    - astrbot-negative-001
    - astrbot-platform-005
    - astrbot-tools-002
    - scrapy-feed-001
    - scrapy-crawler-006
    - scrapy-download-004
    - astrbot-agent-001
    - astrbot-chat-003
    - astrbot-hook-001
    - astrbot-pipeline-002
    - scrapy-feed-003
    - scrapy-signal-004
  coverage:
    task_type:
      find_callers: 10
      find_callees: 10
    difficulty:
      easy: 4
      medium: 10
      hard: 6
    repos:
      astrbot: 13
      scrapy: 7

full_run:
  case_set: all_70_cases
  selection_rule: choose 4-6 representative combinations after pilot based on precision, recall, evidence accuracy, cost, and failure modes

models:
  primary:
    - provider: openrouter
      alias: deepseek-v4-pro-direct-no-reasoning
    - provider: openrouter
      alias: tencent-hy3-preview-no-reasoning
  local_optional:
    - provider: ollama-native
      alias: gemma4-e2b
      rule: run only selected best PE variant unless local resource schedule is idle

tracks:
  oracle: required
  e2e: required

reporting:
  batch_dir: reports/pe/batches
  summary_dir: reports/pe/summary
  record_file: records/09-pe-optimization.md
