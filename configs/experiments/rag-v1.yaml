version: rag-v1
stage: rag_pipeline
status: implementation_skeleton_ready

baseline_reference:
  dataset: call-chain-v1
  test_set_status: frozen
  baseline_report: reports/baseline/summary/baseline-summary-v0-20260620.md
  e2e_runner: e2e-agent-runner-v1
  scorer: call-chain-scorer-v1

pipeline_requirements:
  - code_chunk_index
  - embedding_index
  - lexical_keyword_search
  - hybrid_retrieval
  - context_pack_builder
  - generation_fusion
  - retrieval_metrics

scripts:
  indexer: scripts/rag_index.py
  retriever: scripts/rag_retrieve.py
  context_packer: scripts/rag_pack_context.py
  context_runner: scripts/run_rag_context.py
  retrieval_evaluator: scripts/rag_eval_retrieval.py

index:
  schema_version: rag-index-v1
  default_output_root: runs/indexes
  repos_yaml: datasets/call-chain-v1/repos.yaml
  default_suffixes:
    - .py
    - .pyi
  include_tests: false
  chunk_lines: 80
  overlap_lines: 20
  max_file_bytes: 500000
  default_manifest_files:
    - manifest.json
    - chunks.jsonl
    - lexical_stats.json

retrieval:
  schema_version: rag-retrieval-v1
  default_output_root: runs/rag-retrieval
  default_variant: bm25_only
  lexical_variants:
    - bm25_only
    - keyword
    - keyword_multiquery
    - keyword_multiquery_safe
  multi_query:
    enabled_variant: keyword_multiquery
    safe_enabled_variant: keyword_multiquery_safe
    default_per_query_top_k: 50
    definition_safety:
      flag: --ensure-definition-slot
      default_slot_rank: 2
      match_source: index.defined_symbols exact target symbol
      no_oracle_or_golden_file_leakage: true
    query_types:
      - case_base
      - target_fqn
      - target_tail
      - module_path
      - target_definition_slot
      - caller_direction
      - caller_method_pattern
      - callee_direction
  dense_variants_status: placeholder_interface_only
  default_top_k: 10
  repo_filter: case_repo_only
  no_golden_leakage: true

retrieval_evaluation:
  schema_version: rag-retrieval-eval-v1
  default_output_root: runs/rag-retrieval-eval
  default_k:
    - 5
    - 10
  evidence_source: golden.required_edges.file
  definition_source: oracle_context.files[role=target_definition].path
  metrics:
    - Recall@K
    - MRR
    - EvidenceFileRecall@K
    - EvidenceLineRecall@K
    - DefinitionAccuracy@K

context_pack:
  schema_version: rag-context-pack-v1.1
  packer_version: rag-context-packer-v1.1
  script: scripts/rag_pack_context.py
  default_output_root: runs/rag-context
  default_retrieval_variant: keyword_multiquery_safe
  default_prompt_template: prompts/oracle-context-v0.md
  default_prompt_version: oracle-context-v0-rag-context-pack
  default_top_k: 10
  default_max_context_tokens: 24000
  deterministic_synthesis_aid:
    default_enabled: true
    disable_flag: --no-synthesis-aid
    default_call_candidate_limit: 40
    source_policy:
      - case metadata without golden/oracle_context
      - retrieval results
      - index chunks
    components:
      - source_policy_and_case_constraints
      - canonical_symbol_hints
      - target_definition_focus
      - target_module_import_context_from_index
      - direct_call_evidence_candidates
      - lifecycle_registration_boundary_notes
    no_golden_or_oracle_context_usage: true
  leakage_policy:
    no_oracle_or_golden_file_injection: true
    source: retrieval.json + index chunks only
    prompt_metadata_excludes:
      - golden
      - oracle_context
  outputs:
    - context_pack.json
    - <case_id>/retrieved_context.md
    - <case_id>/prompt.md
    - <case_id>/case_metadata.yaml
    - <case_id>/synthesis_aid.json

rag_context_runner:
  runner_version: rag-context-runner-v1
  script: scripts/run_rag_context.py
  default_output_root: runs/rag-context-runs
  input: context_pack.json
  default_provider: dry-run
  scorer: call-chain-scorer-v1
  purpose: run baseline generation over retrieved context without PE prompt changes
  model_runs_started: false

embedding_candidates:
  default:
    name: Qwen/Qwen3-Embedding-0.6B
    role: primary local embedding model for multilingual code retrieval
    dimension: 1024
    notes: instruction-aware; use query instruction for call-chain retrieval
  lightweight_code_baseline:
    name: jinaai/jina-embeddings-v2-base-code
    role: fast code embedding baseline
  hybrid_reference:
    name: BAAI/bge-m3
    role: dense/sparse/multi-vector reference model
  optional_api_upper_bound:
    name: voyage-code-3
    role: paid API upper-bound reference
    status: optional_after_local_baselines

retrieval_variants:
  - bm25_only
  - keyword
  - keyword_multiquery
  - keyword_multiquery_safe
  - qwen3_dense
  - jina_code_dense
  - bge_m3_dense
  - qwen3_dense_plus_bm25
  - jina_code_plus_bm25
  - bge_m3_plus_bm25

metrics:
  retrieval:
    - Recall@5
    - Recall@10
    - MRR
    - EvidenceFileRecall
    - DefinitionAccuracy
  e2e:
    - EdgePrecision
    - EdgeRecall
    - EvidenceAccuracy
    - ToolCalls
    - FilesRead
    - ContextTokens
    - Runtime
    - TokenCost

case_sets:
  pilot: use pe-v1 pilot case_ids unless a retrieval-specific subset is justified in the report
  full: all_70_cases

resource_constraints:
  local_gpu_embedding_must_not_overlap_with_formal_finetune_training: true
  online_model_runs_can_overlap_with_finetune_data_construction: true

reporting:
  batch_dir: reports/rag/batches
  summary_dir: reports/rag/summary
  record_file: records/10-rag-pipeline.md

resource_guardrails:
  current_delivery_scope:
    - build_chunk_manifest
    - run_bm25_or_keyword_retrieval
    - evaluate_retrieval_against_golden_evidence_files
  explicitly_not_running_now:
    - local_gpu_embedding_batch_index
    - formal_e2e_model_runs
    - pe_rag_combined_experiment
