# Copy to configs/model-providers.local.yaml when you want machine-specific
# providers or model aliases. The local file is ignored by Git.

providers:
  openrouter:
    type: openai-compatible
    base_url: "${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}"
    api_key_env: OPENROUTER_API_KEY
    api_key_required: true
    default_model_env: OPENROUTER_MODEL
    headers:
      HTTP-Referer: "${OPENROUTER_SITE_URL:-}"
      X-Title: "${OPENROUTER_APP_NAME:-RepoMind}"
    models:
      # Replace these ids with the exact OpenRouter model ids you decide to test.
      - alias: openrouter-default
        id: "${OPENROUTER_MODEL:-}"
        notes: Uses OPENROUTER_MODEL from .env.
      - alias: deepseek-v4-pro-direct
        id: deepseek/deepseek-v4-pro
        routing:
          only:
            - deepseek
          allow_fallbacks: false
        notes: Forces OpenRouter to use the DeepSeek provider slug to avoid higher-cost fallback providers.
      - alias: deepseek-v4-pro-direct-no-reasoning
        id: deepseek/deepseek-v4-pro
        routing:
          only:
            - deepseek
          allow_fallbacks: false
        reasoning:
          effort: none
          exclude: true
        notes: Forces the DeepSeek provider and disables reasoning output for Oracle scoring runs.
      - alias: tencent-hy3-preview-no-reasoning
        id: tencent/hy3-preview
        reasoning:
          effort: none
          exclude: true
        notes: Disables OpenRouter reasoning output for Oracle scoring runs so max_tokens is reserved for the YAML answer.
      - alias: openai-gpt-5.5-no-reasoning
        id: openai/gpt-5.5
        reasoning:
          effort: none
          exclude: true
        notes: Disables OpenRouter reasoning output for baseline scoring runs so max_tokens is reserved for the structured answer.
      - alias: strong-online-1
        id: replace-with-openrouter-model-id
        notes: Placeholder for a high-capability online model.
      - alias: cost-effective-1
        id: replace-with-openrouter-model-id
        notes: Placeholder for a lower-cost online model.

  ollama:
    type: openai-compatible
    base_url: "${OLLAMA_BASE_URL:-http://localhost:11434/v1}"
    api_key_env: OLLAMA_API_KEY
    api_key_required: false
    default_model_env: OLLAMA_MODEL
    models:
      # Ollama model ids are local tags such as qwen2.5-coder:7b or llama3.1:8b.
      - alias: ollama-default
        id: "${OLLAMA_MODEL:-}"
        notes: Uses OLLAMA_MODEL from .env.
      - alias: local-coder-small
        id: qwen2.5-coder:7b
        notes: Example local coding model tag; change to a model installed locally.

  ollama-native:
    type: ollama-native
    base_url: "${OLLAMA_NATIVE_BASE_URL:-http://localhost:11434/api/chat}"
    api_key_env: OLLAMA_API_KEY
    api_key_required: false
    default_model_env: OLLAMA_MODEL
    models:
      - alias: qwen3.5-2b
        id: qwen3.5:2b
        request_body:
          think: false
          options:
            num_ctx: 65536
        notes: Local Qwen3.5 2B model tag for baseline comparison and later fine-tune candidate evaluation; uses Ollama num_ctx=65536 and think=false for long Oracle prompts.
      - alias: gemma4-e2b
        id: gemma4:e2b
        request_body:
          think: false
          options:
            num_ctx: 65536
        notes: Local Gemma 4 E2B model tag for baseline comparison and later fine-tune candidate evaluation; uses Ollama num_ctx=65536 and think=false for long Oracle prompts.
