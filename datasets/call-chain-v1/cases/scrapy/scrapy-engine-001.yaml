      line: 460
      evidence: "self.crawler.engine.crawl(request=output)"
      confidence_type: static_confirmed
    - caller: scrapy.shell.Shell._schedule
      callee: scrapy.core.engine.ExecutionEngine.crawl
      file: scrapy/shell.py
      line: 197
      evidence: "self.crawler.engine.crawl(request)"
      confidence_type: static_confirmed
