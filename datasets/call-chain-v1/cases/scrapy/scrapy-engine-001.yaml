notes: >
  Upstream caller case for request scheduling. It includes the normal scraper
  path and the interactive shell path, and filters same-name crawler methods.
oracle_context:
  files:
    - path: scrapy/core/engine.py
      role: target_definition
      symbols:
        - scrapy.core.engine.ExecutionEngine.crawl
      reason: Defines the target engine scheduling method.
    - path: scrapy/core/scraper.py
      role: direct_caller
      symbols:
        - scrapy.core.scraper.Scraper._process_spidermw_output_async
      reason: Normal spider-output path schedules Request objects through the engine.
    - path: scrapy/shell.py
      role: direct_caller
      symbols:
        - scrapy.shell.Shell._schedule
      reason: Interactive shell path schedules a request through the engine.
    - path: scrapy/crawler.py
      role: distractor
      symbols:
        - scrapy.crawler.Crawler.crawl
        - scrapy.crawler.CrawlerRunner.crawl
      reason: Same-name crawl methods are not upstream callers of ExecutionEngine.crawl.
golden:
  required_edges:
