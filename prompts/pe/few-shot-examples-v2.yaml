version: pe-few-shot-v2
minimum_examples: 23
status: precision_revision
data_policy: synthetic_examples_only_no_golden_answers

coverage_plan:
  task_type:
    find_callers: 11
    find_callees: 12
  focus:
    direct_call: 2
    upstream_callers: 2
    negative_no_call: 2
    import_not_call: 1
    string_not_call: 1
    test_filtering: 1
    external_filtering: 1
    constructor: 2
    object_method: 2
    registration_callback_boundary: 2
    large_fan_in: 2
    depth_control: 2
    helper_over_inclusion_negative: 3

examples:
  - id: fs-direct-callee-001
    status: representative
    task_type: find_callees
    focus: direct_call
    metadata:
      target: sample.handlers.UserHandler.save
      max_depth: 1
      include_tests: false
      external_deps: exclude
    context_excerpt:
      file: sample/handlers.py
      lines:
        - "21 | class UserHandler:"
        - "24 |     def save(self, user):"
        - "25 |         return self.service.persist(user)"
    expected_output:
      case_id: fs-direct-callee-001
      edges:
        - caller: sample.handlers.UserHandler.save
          callee: sample.services.UserService.persist
          file: sample/handlers.py
          line: 25
          evidence: return self.service.persist(user)
          confidence_type: static_confirmed
    teaches:
      - direct downstream method call
      - object receiver maps to repo service type

